<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Cart</title>
<style>
    header {
        background-color: green;
        color: white;
        padding: 10px 0;
        text-align: center;
    }
    nav {
        background-color: grey;
        padding: 10px;
    }
    nav ul {
        list-style-type: none;
        margin: 0;
        padding: 0;
    }
    nav ul li {
        display: inline;
        margin-right: 20px;
    }
    nav ul li a {
        color: white;
        text-decoration: none;
    }
    .container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
    }
    .product {
        border: 1px solid #ccc;
        padding: 10px;
        border-radius: 5px;
        text-align: center;
    }
</style>
</head>
<body>
<header>
    <h1>Shopping Cart</h1>
    <nav>
        <ul>
            <li><a href="login.html">Login</a></li>
            <li><a href="cart.html">Cart</a></li>
            <li><a href="re.html">Register</a></li>
        </ul>
    </nav>
</header>

<div class="container">
    <div id="catalog">
        <h2>Catalog</h2>
        <div class="product">
            <h3>Product 1</h3>
            <p>Price: $10</p>
            <button onclick="addToTotal(10)">Add to Cart</button>
        </div>
        <div class="product">
            <h3>Product 2</h3>
            <p>Price: $20</p>
            <button onclick="addToTotal(20)">Add to Cart</button>
        </div>
        <div class="product">
            <h3>Product 3</h3>
            <p>Price: $30</p>
            <button onclick="addToTotal(30)">Add to Cart</button>
        </div>
    </div>

    <div>
        <h2>Total</h2>
        <p id="totalPrice">Total Price: $0</p>
    </div>
</div>

<script>
    let total = 0;

    function addToTotal(price) {
        total += price;
        document.getElementById('totalPrice').textContent = `Total Price: $${total}`;
    }
</script>
</body>
</html>
