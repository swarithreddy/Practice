{% extends "base.html" %}

{% block content %}
<p><a href="/logout">Logout</a></p>

<form method="POST" class="task-form">
    <input type="text" name="task" placeholder="Enter a task" required>
    <button type="submit">Add Task</button>
</form>

<ul class="task-list">
    {% for task in tasks %}
        <li>
            {% if task['completed'] %}
                <s>{{ task['content'] }}</s>
            {% else %}
                {{ task['content'] }}
                <a href="/complete/{{ task['id'] }}">✔</a>
            {% endif %}
            <a href="/delete/{{ task['id'] }}">❌</a>
        </li>
    {% endfor %}
</ul>

{% endblock %}
